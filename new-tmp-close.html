<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Pixel Preview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{box-sizing:border-box;margin:0;font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
    body{background:#e0e0e0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}

    .phone{
      width:420px;
      height:760px;
      background:#efeae2;
      background-image:url("https://static.whatsapp.net/rsrc.php/v3/yA/r/3XjvM8yK5Q0.png");
      background-size:412px 749px;
      border-radius:28px;
      overflow:hidden;
      box-shadow:0 25px 60px rgba(0,0,0,.25);
      display:flex;
      flex-direction:column;
    }

    .chat-header{
      background:#f0f2f5;
      padding:10px 14px;
      display:flex;
      align-items:center;
      gap:10px;
      border-bottom:1px solid #d1d7db;
    }

    .avatar{
      width:40px;height:40px;border-radius:50%;
      background:#dfe5e7;display:flex;align-items:center;justify-content:center;
      color:#54656f;font-size:18px;
    }

    .chat-body{flex:1;padding:14px;display:flex;flex-direction:column;justify-content:flex-end}

    .row{display:flex;align-items:flex-end}

    .bubble{
      background:white;
      border-radius:8px 8px 8px 2px;
      padding:8px 12px 16px 12px;
      max-width:320px;
      position:relative;
      box-shadow:0 1px 0 rgba(0,0,0,.08);
    }

    .media{
      background:#f0f2f5;
      border-radius:6px;
      padding:22px;
      text-align:center;
      margin-bottom:6px;
      color:#667781;
    }

    .header{font-weight:600;font-size:.95rem;margin-bottom:2px;color:#111b21}
    .body{font-size:.93rem;line-height:1.45;color:#111b21;white-space:pre-wrap}
    .footer{font-size:.74rem;color:#667781;margin-top:4px}

    .buttons{border-top:1px solid #e9edef;margin-top:6px}

    .btn{
      text-align:center;
      padding:12px 10px;
      border-top:1px solid #e9edef;
      color:#00a884;
      font-weight:500;
      font-size:.9rem;
    }

    .time{
      position:absolute;
      right:8px;
      bottom:4px;
      font-size:.68rem;
      color:#8696a0;
    }
  </style>
</head>
<body>

<div class="phone">
  <div class="chat-header">
    <div class="avatar"><i class="fab fa-whatsapp"></i></div>
    <div>
      <div style="font-weight:600">Business Account</div>
      <div style="font-size:.8rem;color:#667781">online</div>
    </div>
  </div>

  <div class="chat-body">
    <div class="row">
      <div class="bubble">
        <div class="media"><i class="fas fa-image"></i> Media preview</div>
        <div class="header">🔥 Flash sale 24h</div>
        <div class="body">Hello Daniel! Use code SALE20 for 20% off. Visit our store.</div>
        <div class="footer">Reply STOP to opt out</div>

        <div class="buttons">
          <div class="btn"><i class="fas fa-link"></i> Shop now</div>
          <div class="btn"><i class="fas fa-phone"></i> Call support</div>
        </div>

        <div class="time">12:34</div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
